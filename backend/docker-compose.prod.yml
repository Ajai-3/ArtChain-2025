version: '3.9'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    ports: ['9200:9200']
    volumes: [es_data:/usr/share/elasticsearch/data]
    networks: [backend]

  user-admin-service:
    image: ${DOCKERHUB_USERNAME}/artchain-user-admin-service:latest
    container_name: user-admin-service
    networks: [backend]

  art-service:
    image: ${DOCKERHUB_USERNAME}/artchain-art-service:latest
    container_name: art-service
    networks: [backend]

  wallet-service:
    image: ${DOCKERHUB_USERNAME}/artchain-wallet-service:latest
    container_name: wallet-service
    networks: [backend]

  elastic-search-service:
    image: ${DOCKERHUB_USERNAME}/artchain-elastic-search-service:latest
    container_name: elastic-search-service
    networks: [backend]

  notification-service:
    image: ${DOCKERHUB_USERNAME}/artchain-notification-service:latest
    container_name: notification-service
    networks: [backend]

  s3-service:
    image: ${DOCKERHUB_USERNAME}/artchain-s3-service:latest
    container_name: s3-service
    networks: [backend]

  chat-service:
    image: ${DOCKERHUB_USERNAME}/artchain-chat-service:latest
    container_name: chat-service
    networks: [backend]

  api-gateway:
    image: ${DOCKERHUB_USERNAME}/artchain-api-gateway:latest
    container_name: api-gateway
    networks: [backend]

  nginx:
    image: nginx:alpine
    container_name: api-reverse-proxy
    ports: ['80:80', '443:443']
    volumes: ['./nginx/nginx.conf:/etc/nginx/nginx.conf:ro']
    networks: [backend]

networks:
  backend:
volumes:
  es_data: