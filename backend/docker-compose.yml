version: '3.9'

services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.11.1
    container_name: elasticsearch
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - xpack.security.http.ssl.enabled=false
    ports:
      - '9200:9200'
    volumes:
      - es_data:/usr/share/elasticsearch/data
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:9200/ || exit 1']
      interval: 10s
      retries: 5

  user-admin-service:
    container_name: user-admin-service
    build: ./services/user-admin-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/user-admin-service/.env.docker
    ports:
      - '4001:4001'
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  art-service:
    container_name: art-service
    build: ./services/art-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/art-service/.env.docker
    ports:
      - '4002:4002'
    depends_on:
      - user-admin-service
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4002/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  wallet-service:
    container_name: wallet-service
    build: ./services/wallet-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/wallet-service/.env.docker
    ports:
      - '4003:4003'
    networks:
      - backend
    healthcheck:
      test: ['CMD-SHELL', 'curl -f http://localhost:4003/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3

  elastic-search-service:
    container_name: elastic-search-service
    build: ./services/elastic-search-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/elastic-search-service/.env
    ports:
      - '4004:4004'
    depends_on:
      - elasticsearch
    networks:
      - backend

  notification-service:
    container_name: notification-service
    build: ./services/notification-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/notification-service/.env.docker
    ports:
      - '4005:4005'
    networks:
      - backend

  s3-service:
    container_name: s3-service
    build: ./services/s3-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/s3-service/.env
    ports:
      - '4006:4006'
    networks:
      - backend

  chat-service:
    container_name: chat-service
    build: ./services/chat-service
    restart: unless-stopped
    env_file:
      - .env
      - ./services/chat-service/.env.docker
    ports:
      - '4007:4007'
    networks:
      - backend

  api-gateway:
    container_name: api-gateway
    build: ./api-gateway
    restart: unless-stopped
    env_file:
      - .env
      - ./api-gateway/.env.docker
    ports:
      - '4000:4000'
    depends_on:
      - user-admin-service
    networks:
      - backend

  nginx:
    image: nginx:alpine
    container_name: api-reverse-proxy
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api-gateway
    networks:
      - backend

networks:
  backend:

volumes:
  es_data:
